# 推送 main 时构建 Vite 项目，并把 dist 发布到 GitHub Pages
# 仓库 Settings → Pages → Build and deployment 的 Source 请选择「GitHub Actions」
# 部署成功后自动触发副仓 lumiphone-cn，同步 www.lumiphone.cn（需 secrets.GH_PAT）
name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # 不用 npm ci：锁文件在 Windows 与 Linux 可选依赖（Tailwind oxide / @emnapi）上易不同步导致 EUSAGE
      - run: npm install --no-audit --no-fund
      # 云端 Web Push 离线兜底（workers.dev 国内常需梯子，见 .env.example）
      # 网页链接识别：生产环境不设置 VITE_APIZERO_PROXY_BASE，浏览器直连 v1.apizero.cn（国内可用）
      # 本地向量模型（GitHub Pages）：见 workers/hf-mirror-proxy/README.md
      # 在仓库 Settings → Actions → Variables 配置 VITE_HF_REMOTE_HOST（Worker 地址，末尾带 /）
      # 未配置时回落 hf-mirror.com（国内多数可用；若 CORS 失败请部署 Worker 并填变量）
      - run: npm run build
        env:
          CI: true
          COLUMNS: '9999'
          # 保留 GitHub Pages 项目站子路径；Cloudflare Pages 用根路径（见 deploy-cloudflare-pages.yml）
          VITE_BASE: /Lumi-Phone/
          VITE_WEB_PUSH_API_BASE: https://lumi-push.lyx815934990.workers.dev
          VITE_USER_SYSTEM_API_BASE: https://user-system-api.lyx815934990.workers.dev
          VITE_DISCORD_CLIENT_ID: ${{ secrets.VITE_DISCORD_CLIENT_ID }}
          VITE_HF_REMOTE_HOST: ${{ vars.VITE_HF_REMOTE_HOST || 'https://hf-mirror.com/' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # 主站 github.io 部署成功后，触发副仓同步自定义域名站
  sync-domain-site:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger lumiphone-cn domain deploy
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::未配置 secrets.GH_PAT，已跳过同步 www.lumiphone.cn。请按仓库说明创建 Token 并写入主仓/副仓 Secrets。"
            exit 0
          fi
          gh workflow run "Deploy GitHub Pages (domain verify)" \
            --repo lyx815934990-oss/lumiphone-cn
          echo "已触发副仓部署：https://www.lumiphone.cn/"
