# 推送 main 时构建 Vite 项目，并把 dist 发布到 GitHub Pages
# 仓库 Settings → Pages → Build and deployment 的 Source 请选择「GitHub Actions」
name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # 不用 npm ci：锁文件在 Windows 与 Linux 可选依赖（Tailwind oxide / @emnapi）上易不同步导致 EUSAGE
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
