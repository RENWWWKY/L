name = "netease-qr-login"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# 尽量靠近网易云机房（仍可能因网易风控失败，见 README）
[placement]
mode = "smart"

# 可选：在 Cloudflare 控制台 → 设置 → 变量 添加
# NETEASE_UPSTREAM = https://你的 NeteaseCloudMusicApi 镜像地址（不要末尾斜杠）

# 部署后即为 https://netease-qr-login.<你的子域>.workers.dev
# 前端通过 VITE_NETEASE_API_BASE 指向该地址
